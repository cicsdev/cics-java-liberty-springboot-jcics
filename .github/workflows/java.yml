name: Build

permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: '0 0 * * *'

jobs:
  check-copyright:
    runs-on: ubuntu-latest
    name: Check Copyright
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: copyright-action
        uses: cicsdev/.github/.github/actions/samples-copyright-checker@4134522d8109169bb8c460db841f94167ec2802f
        with:
          directory: './cics-java-liberty-springboot-jcics/'
          file-extensions: '*.java'
          base-copyright: 'Copyright IBM Corp. 2026'
          token: ${{ secrets.GITHUB_TOKEN }}

  build-mvnw:
    name: Build Maven Wrapper

    runs-on: ubuntu-latest
    strategy:
      matrix:
         jdk: [17, 21, 25]
         
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK ${{ matrix.jdk }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.jdk }}
          distribution: "semeru"
          cache: maven
      - name: Build with Maven
        run: ./mvnw --batch-mode --update-snapshots --file pom.xml -Djava.version=${{ matrix.jdk }} package 

  build-gradlew:
    name: Build Gradle wrapper
    
    runs-on: ubuntu-latest
    strategy:
      matrix:
         jdk: [17, 21, 25]
         
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK ${{ matrix.jdk }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.jdk }}
        distribution: 'semeru'
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
    - name: Build with Gradle
      run: ./gradlew build bootWar -Pjava_version=${{ matrix.jdk }}

